name: Update Changelog

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to update changelog for'
        required: true
        type: string

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ steps.version.outputs.tag }}
          excludeTypes: build,docs,other,style
          useGitmojis: false

      - name: Commit updated CHANGELOG
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          branch: main
          commit_message: "docs: update CHANGELOG for ${{ steps.version.outputs.tag }}"
          file_pattern: CHANGELOG.md
